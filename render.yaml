# Render Blueprint — single Docker web service that serves BOTH the FastAPI
# backend and the compiled Vite frontend from one origin. That's the whole fix:
# in prod there is no :5173 dev server proxying /api, so we let FastAPI serve
# the built frontend and the relative /api/... calls just work.
#
# Deploy: push to GitHub, then in Render → New → Blueprint, point at this repo.
services:
  - type: web
    name: standing
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      # DEMO_MODE=1 runs fully offline on canned fixtures (safest for a demo).
      # Set to 0 in the Render dashboard once the API keys below are filled in.
      - key: DEMO_MODE
        value: "1"
      # Encryption key for stored profile PII — generated once, kept by Render.
      - key: PROFILE_ENCRYPTION_KEY
        generateValue: true
      # Live API credentials — only needed when DEMO_MODE=0. Set in dashboard.
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_BASE_URL
        sync: false
      - key: QWEN_MODEL
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
